# =========================================================
# Royal Connect – Configuration Nginx
# Site statique : compression, cache, en-têtes de sécurité
# =========================================================

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---------- Compression Gzip ----------
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types        text/plain
                      text/css
                      text/javascript
                      application/javascript
                      application/json
                      application/xml
                      image/svg+xml;

    # ---------- En-têtes de sécurité ----------
    add_header X-Frame-Options        "SAMEORIGIN"        always;
    add_header X-Content-Type-Options "nosniff"           always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection       "1; mode=block"     always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;

    # ---------- Page d'accueil ----------
    location = / {
        try_files /index.html =404;
    }

    # ---------- Ressources statiques : cache long ----------
    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|webp|woff2?|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # ---------- Pages HTML : pas de cache (déploiements rapides) ----------
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # ---------- Fallback ----------
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ---------- Bloquer l'accès aux fichiers sensibles ----------
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ---------- Pages d'erreur ----------
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
